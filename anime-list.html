<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Anime - Beginners Anime</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🎌</span>
                <h1>Beginners Anime</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="anime-list.html" class="active">Browse Anime</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <h1>Browse All Anime</h1>
        <p>Find your next favorite show</p>
    </section>

    <!-- Filter & Search Section -->
    <section class="filter-section">
        <div class="filter-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search anime by name..." class="search-input">
                <span class="search-icon">🔍</span>
            </div>
            
            <div class="filters">
                <div class="filter-group">
                    <label for="genreFilter">Genre:</label>
                    <select id="genreFilter" class="filter-select">
                        <option value="">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Fantasy">Fantasy</option>
                        <option value="Romance">Romance</option>
                        <option value="Supernatural">Supernatural</option>
                        <option value="Adventure">Adventure</option>
                        <option value="Slice of Life">Slice of Life</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="ratingFilter">Min Rating:</label>
                    <select id="ratingFilter" class="filter-select">
                        <option value="">All Ratings</option>
                        <option value="8">8.0+</option>
                        <option value="8.5">8.5+</option>
                        <option value="9">9.0+</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="statusFilter">Status:</label>
                    <select id="statusFilter" class="filter-select">
                        <option value="">All Status</option>
                        <option value="Completed">Completed</option>
                        <option value="Ongoing">Ongoing</option>
                    </select>
                </div>

                <button class="reset-button" id="resetFilters">Reset Filters</button>
            </div>
        </div>
    </section>

    <!-- Anime Grid -->
    <section class="anime-grid-section">
        <div class="anime-grid" id="animeGrid">
            <!-- Anime cards will be loaded here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Beginners Anime. Start your anime journey today!</p>
        <p>Made with ❤️ for anime lovers</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
